# PULS — Live-Umfragen (puls.verwalterfuchs.de)
# Nutzt die http-weite Zone api_limit (aus conf.d/rate-limiting.conf).

server {
    server_name puls.verwalterfuchs.de;
    server_tokens off;

    # --- Security-Header (analog zum Verwalterfuchs-vHost) ------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: alles vom eigenen Server; keine externen Quellen. 'unsafe-inline'
    # ist nötig, da Presenter/Vote Inline-Skripte und -Styles nutzen.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    # gemeinsame Proxy-Einstellungen (inkl. SSE: nicht puffern, lange offen halten)
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    client_max_body_size 256k;

    location / {
        proxy_pass http://127.0.0.1:3210;
    }

    # API: grober Netz-Backstop. Großzügiger burst, damit viele Teilnehmer
    # hinter demselben Firmen-NAT nicht fälschlich gedrosselt werden — die
    # eigentliche Begrenzung passiert anwendungsseitig (Obergrenzen/Rate-Limit).
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://127.0.0.1:3210;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/puls.verwalterfuchs.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/puls.verwalterfuchs.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = puls.verwalterfuchs.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name puls.verwalterfuchs.de;
    return 404; # managed by Certbot
}
