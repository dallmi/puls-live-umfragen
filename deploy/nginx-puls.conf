# PULS — Live-Umfragen (puls.verwalterfuchs.de)
# TLS wird von certbot ergänzt (certbot --nginx -d puls.verwalterfuchs.de --redirect)
server {
    listen 80;
    server_name puls.verwalterfuchs.de;
    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events: nicht puffern, Verbindung lange offen halten
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }
}
