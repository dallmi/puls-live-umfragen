<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PULS — Abstimmen</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/design-system.css">
<link rel="stylesheet" href="/app.css">
</head>
<body>

<header class="ds-header">
  <a class="brand ds-title" href="/"><img id="brandLogo" class="brand-logo" hidden alt=""><b>PULS</b></a>
  <div class="ds-header-controls">
    <span class="ds-subtitle" id="codeLabel"></span>
    <span id="langToggle"></span>
  </div>
</header>

<main>
  <div class="vote-shell" id="root">
    <div class="vote-waiting">
      <div class="ds-spinner"></div>
      <p data-i18n="vote.connecting">Verbinde …</p>
    </div>
  </div>
  <div class="vote-shell" style="padding-top:0;">
    <div class="reaction-bar" id="reactionBar" hidden></div>
  </div>
</main>

<footer class="footer-note" style="text-align:center;">
  <a href="/datenschutz.html" data-i18n="landing.privacy">Datenschutz</a>
</footer>

<script src="/i18n.js"></script>
<script src="/common.js"></script>
<script>
'use strict';

document.title = t('vote.pageTitle');
initLangToggle(document.getElementById('langToggle'), refreshLanguage);

const params = new URLSearchParams(location.search);
const CODE = (params.get('code') || '').replace(/\D/g, '');
const root = document.getElementById('root');
const PID = participantId();

let presId = null;
let snap = null;
let renderedKey = null;   // slide.id + locked — Formular nur bei Änderung neu bauen
let selection = [];       // Auswahl bei choice/scale
let upvoted = new Set(); // pro Präsentation geladen, sobald presId bekannt ist
let paceIndex = 0;        // Selbststeuerung: Folie, auf der die Person gerade ist

// Aktuelle Folie/Ergebnisse — bei Selbststeuerung lokal geblättert, sonst vom Moderator gesteuert.
function curSlide() { return snap.selfPaced ? ((snap.slides || [])[paceIndex] || null) : snap.slide; }
function curResults() {
  if (snap.selfPaced) return snap.resultsList ? (snap.resultsList[paceIndex] || null) : null;
  return snap.results;
}
function curCount() { return snap.selfPaced ? ((snap.slides || []).length || snap.slideCount) : snap.slideCount; }
function curIndex() { return snap.selfPaced ? paceIndex : snap.activeIndex; }

function goPace(delta) {
  const n = curCount();
  const next = Math.min(Math.max(0, paceIndex + delta), Math.max(0, n - 1));
  if (next === paceIndex) return;
  paceIndex = next;
  sessionStorage.setItem('puls.pace.' + presId, String(paceIndex));
  renderedKey = null;
  onSnapshot(snap);
}

function votedStore() {
  return JSON.parse(sessionStorage.getItem('puls.voted.' + presId) || '{}');
}
function markVoted(slideId, value) {
  const s = votedStore();
  s[slideId] = value;
  sessionStorage.setItem('puls.voted.' + presId, JSON.stringify(s));
}
function storedName() { return localStorage.getItem('puls.name.' + presId) || ''; }

if (!CODE || CODE.length !== 6) {
  location.replace('/');
} else {
  document.getElementById('codeLabel').textContent = 'Code ' + formatCode(CODE);
  init();
}

async function init() {
  try {
    const joined = await api('GET', `/api/join/${CODE}`);
    presId = joined.id;
    // localStorage (nicht session): bleibt wie die participantId erhalten, sodass die
    // „gevotet"-Markierung nach erneutem Öffnen mit dem Serverzustand übereinstimmt.
    upvoted = new Set(JSON.parse(localStorage.getItem('puls.upvoted.' + presId) || '[]'));
    paceIndex = parseInt(sessionStorage.getItem('puls.pace.' + presId) || '0', 10) || 0;
    setupReactionBar();
    connectStream(presId, 'audience', onSnapshot);
  } catch {
    root.innerHTML = `
      <div class="ds-empty">
        <h3>${t('vote.noEvent.title')}</h3>
        <p>${t('vote.noEvent.desc', { code: esc(formatCode(CODE)) })}</p>
        <p style="margin-top:1rem;"><a class="ds-btn" href="/">${t('vote.noEvent.homeLink')}</a></p>
      </div>`;
  }
}

function onSnapshot(s) {
  snap = s;
  // Selbststeuerung: paceIndex im gültigen Bereich halten (z. B. wenn Folien gelöscht wurden)
  if (s.selfPaced) paceIndex = Math.min(paceIndex, Math.max(0, curCount() - 1));
  const slide = curSlide();
  const gate = s.collectNames && !storedName();
  let key = gate ? 'namegate' : (slide ? `${s.selfPaced ? paceIndex + '|' : ''}${slide.id}|${s.votingLocked}` : 'none');

  // Moderation hat die Antworten zurückgesetzt → lokalen Status verwerfen
  const res = curResults();
  if (slide && res && res.voters === 0 && votedStore()[slide.id] !== undefined) {
    const store = votedStore();
    delete store[slide.id];
    sessionStorage.setItem('puls.voted.' + presId, JSON.stringify(store));
    renderedKey = null;
  }

  if (key !== renderedKey) {
    renderedKey = key;
    selection = [];
    buildSlide();
  }
  updateResults();
  repaintMorph(snap);
  updateMeta();
  updateReactionBar();
  applyBrand(snap.brand, presId, [document.getElementById('brandLogo')]);
}

// Balken-Morph (choice/scale) auf JEDEM Snapshot neu zeichnen — nicht nur beim
// eigenen Tap. So bleiben die Balken live (andere Stimmen kommen rein) und
// respektieren ein Live-Umschalten von „Ergebnisse ausblenden" durch die Moderation.
// Baut das Formular NICHT neu, malt nur die bereits vorhandenen Buttons um.
function repaintMorph(snap) {
  const slide = curSlide();
  if (!slide) return;
  if (!(slide.type === 'choice' || slide.type === 'scale' || slide.type === 'points' || slide.type === 'ranking')) return;

  const prev = votedStore()[slide.id];
  if (prev === undefined) return; // noch nicht abgestimmt → nichts zu übermalen

  if (slide.type === 'choice') {
    const box = document.querySelector('#voteForm .vote-options');
    if (box) paintChoiceResults(box, slide, Array.isArray(prev) ? prev : []);
  } else if (slide.type === 'scale') {
    const picker = document.querySelector('#voteForm .scale-picker');
    if (picker && typeof prev === 'number') paintScaleResults(picker, slide, prev);
  } else if (slide.type === 'points' || slide.type === 'ranking') {
    // Nur nachmalen, wenn gerade das Board (nicht die Eingabe nach „Ändern") gezeigt wird.
    const holder = document.querySelector('#voteForm .morph-board');
    if (holder) paintMorphBoard(holder, slide, null);
  }
}

function updateMeta() {
  const pos = document.getElementById('posLabel');
  if (pos && curCount()) pos.textContent = t('common.slidePosition', { n: curIndex() + 1, total: curCount() });
}

function setupReactionBar() {
  const bar = document.getElementById('reactionBar');
  if (!bar || bar.childElementCount) return;
  REACTION_EMOJIS.forEach((emoji) => {
    const btn = el(`<button class="reaction-btn" aria-label="${t('vote.react.aria')}">${emoji}</button>`);
    btn.addEventListener('click', () => sendReaction(presId, emoji));
    bar.appendChild(btn);
  });
}

function updateReactionBar() {
  const bar = document.getElementById('reactionBar');
  if (!bar) return;
  const gated = snap.collectNames && !storedName();
  bar.hidden = !(curSlide() && !gated);
}

// ---------------------------------------------------------------------------
// Folie aufbauen
// ---------------------------------------------------------------------------

function buildSlide() {
  const slide = curSlide();
  resultsVisible = false;
  root.innerHTML = '';

  const oldBar = document.getElementById('voteConfirmBar');
  if (oldBar) oldBar.remove();

  // Namensabfrage, falls die Moderation „Namen erfassen" aktiviert hat und noch keiner gesetzt ist
  if (snap.collectNames && !storedName()) {
    buildNameGate();
    return;
  }

  if (!slide) {
    root.appendChild(el(`
      <div class="vote-waiting">
        <div class="ds-spinner"></div>
        <p>${t('vote.waitingStart')}</p>
      </div>`));
    return;
  }

  root.appendChild(el(`
    <div class="vote-topline">
      <span class="pt">${esc(snap.title)}</span>
      <span class="pos" id="posLabel"></span>
    </div>`));

  const questionText = slide.question || typeMeta(slide.type).label || '';
  if (questionText && slide.type !== 'info') {
    root.appendChild(el(`<div class="vote-question">${esc(questionText)}</div>`));
  }

  const form = el('<div id="voteForm"></div>');
  root.appendChild(form);

  switch (slide.type) {
    case 'choice':    buildChoice(form, slide); break;
    case 'wordcloud': buildWordcloud(form, slide); break;
    case 'open':      buildOpen(form, slide); break;
    case 'scale':     buildScale(form, slide); break;
    case 'points':    buildPoints(form, slide); break;
    case 'ranking':   buildRanking(form, slide); break;
    case 'quiz':      buildQuiz(form, slide); break;
    case 'qa':        buildQa(form, slide); break;
  }

  if (snap.votingLocked && slide.type !== 'info') applyLock(form);

  if (slide.type === 'info') {
    if (slide.question) form.appendChild(el(`<div class="vote-question">${esc(slide.question)}</div>`));
    if (slide.text) form.appendChild(el(`<div class="info-text">${esc(slide.text).replace(/\n/g, '<br>')}</div>`));
  }

  const isQaBoard = slide.type === 'qa';
  const boardTitle = isQaBoard ? t('vote.qa.boardTitle') : t('vote.results.title');
  const boardHint = isQaBoard ? `<p class="vote-board-hint">${t('vote.qa.boardHint')}</p>` : '';
  root.appendChild(el(`<div class="vote-results-block" id="resultsBlock" hidden><h3>${boardTitle}</h3>${boardHint}<div id="resultsBox"></div></div>`));

  // Selbststeuerung: Blätter-Navigation
  if (snap.selfPaced) {
    const n = curCount();
    const nav = el(`
      <div class="pace-nav">
        <button class="ds-btn" id="pacePrev"${paceIndex <= 0 ? ' disabled' : ''}>${t('vote.pace.prev')}</button>
        <span class="pace-pos">${t('common.slidePosition', { n: paceIndex + 1, total: n })}</span>
        <button class="ds-btn ds-btn-primary" id="paceNext"${paceIndex >= n - 1 ? ' disabled' : ''}>${t('vote.pace.next')}</button>
      </div>`);
    nav.querySelector('#pacePrev').addEventListener('click', () => goPace(-1));
    nav.querySelector('#paceNext').addEventListener('click', () => goPace(1));
    root.appendChild(nav);
  }

  updateMeta();
}

function submittedNote(text) {
  return el(`<div class="vote-submitted">${esc(text)}</div>`);
}

// --- Namensabfrage-Gate ------------------------------------------------------
function buildNameGate() {
  const box = el(`
    <div>
      <div class="vote-topline"><span class="pt">${esc(snap.title)}</span></div>
      <div class="vote-question">${t('vote.name.prompt')}</div>
      <div class="field">
        <input type="text" id="nameInput" maxlength="40" autocomplete="name"
               placeholder="${t('vote.name.placeholder')}">
      </div>
      <button class="ds-btn ds-btn-primary ds-btn-lg" id="nameSubmit">${t('vote.name.submit')}</button>
      <div class="error-note" id="nameErr"></div>
    </div>`);
  root.appendChild(box);
  const input = box.querySelector('#nameInput');
  const err = box.querySelector('#nameErr');
  input.focus();
  async function go() {
    const name = input.value.trim();
    if (!name) return;
    try {
      const r = await api('POST', `/api/presentations/${presId}/identify`, { participantId: PID, name });
      localStorage.setItem('puls.name.' + presId, r.name || name);
      renderedKey = null;
      onSnapshot(snap); // erneut auswerten → jetzt Folie statt Gate
    } catch (e) {
      if (e.message === 'names_disabled') {
        // Moderation hat „Namen erfassen" inzwischen abgeschaltet → Gate sofort auflösen
        snap.collectNames = false;
        renderedKey = null;
        onSnapshot(snap);
      } else {
        err.textContent = t('vote.name.err');
      }
    }
  }
  box.querySelector('#nameSubmit').addEventListener('click', go);
  input.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') go(); });
}

async function submit(value, onOk, onErr) {
  try {
    const r = await api('POST', `/api/presentations/${presId}/answers`, {
      slideId: curSlide().id,
      participantId: PID,
      value,
    });
    onOk && onOk(r); // r kann Quiz-Feedback enthalten ({ quiz: { correct, points } })
  } catch (e) {
    onErr && onErr(e);
  }
}

function applyLock(form) {
  form.classList.add('is-locked');
  form.querySelectorAll('button, input, textarea, [role="slider"], .rank-handle').forEach((e) => {
    e.setAttribute('disabled', '');
    e.classList.add('locked-el');
    e.style.pointerEvents = 'none';
  });
  // feste Bestätigen-Leiste, falls vorhanden, ebenfalls sperren
  const bar = document.getElementById('voteConfirmBar');
  if (bar) bar.querySelectorAll('button').forEach((b) => { b.disabled = true; });
  if (!form.querySelector('.vote-lock-chip')) {
    form.insertBefore(el(`<div class="vote-lock-chip">${esc(t('vote.locked.chip'))}</div>`), form.firstChild);
  }
}

function voteBar({ label, onConfirm }) {
  const barEl = el(`
    <div class="vote-confirm-bar" id="voteConfirmBar">
      <button class="ds-btn ds-btn-primary ds-btn-lg" id="voteConfirmBtn" disabled>${esc(label)}</button>
    </div>`);
  const btn = barEl.querySelector('#voteConfirmBtn');
  btn.addEventListener('click', () => { if (!btn.disabled) onConfirm(); });
  (document.getElementById('root') || document.body).appendChild(barEl);
  return { el: barEl, setEnabled: (b) => { btn.disabled = !b; } };
}

// Morph: Eingabe (Slider/Ranking) → Ergebnis-Board + „Ändern". Geteilt von buildPoints
// (Task 5) und buildRanking (Task 6). Malt den Board-Inhalt über paintMorphBoard, damit
// repaintMorph ihn — wie die choice/scale-Balken — auf JEDEM Snapshot live nachzeichnen
// kann, statt nur einmal beim Bestätigen. So bleibt das Board aktuell, wenn andere
// Teilnehmende noch abstimmen, und verschwindet sofort, wenn die Moderation „Ergebnisse
// ausblenden" umschaltet — ohne das schon live aktualisierende #resultsBlock zu duplizieren
// (das bleibt hier ausgeblendet, weil morphBoard showResults()/resultsVisible nicht anfasst).
function paintMorphBoard(holder, slide, own) {
  holder.innerHTML = '';
  if (snap.resultsHidden || !curResults()) {
    holder.appendChild(submittedNote(t('vote.thanks')));
  } else {
    const box = el('<div></div>');
    renderResults(box, slide, curResults(), own != null ? { own } : {});
    holder.appendChild(box);
  }
}

function morphBoard(form, slide, own) {
  const oldBar = document.getElementById('voteConfirmBar');
  if (oldBar) oldBar.remove();
  form.innerHTML = '';
  const holder = el('<div class="morph-board"></div>');
  form.appendChild(holder);
  paintMorphBoard(holder, slide, own);
  const change = el(`<button class="ds-btn ds-btn-lg" style="margin-top:1rem;">${esc(t('vote.change'))}</button>`);
  change.addEventListener('click', () => {
    form.innerHTML = '';
    if (slide.type === 'points') buildPoints(form, slide, true);
    else if (slide.type === 'ranking') buildRanking(form, slide, true);
  });
  form.appendChild(change);
}

// --- Multiple Choice ---------------------------------------------------------
function buildChoiceMulti(form, slide) {
  const prev = votedStore()[slide.id];
  let selection = Array.isArray(prev) ? [...prev] : [];
  let submitted = Array.isArray(prev);

  const box = el('<div class="vote-options"></div>');
  (slide.options || []).forEach((opt, i) => {
    const btn = el(`<button class="vote-option multi${selection.includes(i) ? ' selected' : ''}"><span class="mark"></span><span class="vo-label">${esc(opt)}</span><span class="vo-count"></span></button>`);
    btn.addEventListener('click', () => {
      selection = selection.includes(i) ? selection.filter((x) => x !== i) : [...selection, i];
      box.querySelectorAll('.vote-option').forEach((b, j) => b.classList.toggle('selected', selection.includes(j)));
      bar.setEnabled(selection.length > 0);
    });
    box.appendChild(btn);
  });
  form.appendChild(box);

  const bar = voteBar({ label: t('vote.choice.submit'), onConfirm: () => {
    submit(selection, () => {
      markVoted(slide.id, selection);
      submitted = true;
      paintChoiceResults(box, slide, selection);
      bar.el.querySelector('#voteConfirmBtn').textContent = t('vote.change');
      bar.setEnabled(true);
    });
  }});
  bar.setEnabled(selection.length > 0);
  if (submitted) { paintChoiceResults(box, slide, selection); bar.el.querySelector('#voteConfirmBtn').textContent = t('vote.change'); bar.setEnabled(true); }
}

function buildChoice(form, slide) {
  if (slide.multiple) return buildChoiceMulti(form, slide); // Mehrfachauswahl: Task 4
  const prevArr = votedStore()[slide.id];
  let chosen = Array.isArray(prevArr) && prevArr.length ? prevArr[0] : null;

  const box = el('<div class="vote-options"></div>');
  (slide.options || []).forEach((opt, i) => {
    const btn = el(`<button class="vote-option${chosen === i ? ' selected' : ''}"><span class="mark"></span><span class="vo-label">${esc(opt)}</span><span class="vo-count"></span></button>`);
    btn.addEventListener('click', () => {
      chosen = i;
      box.querySelectorAll('.vote-option').forEach((b, j) => b.classList.toggle('selected', j === i));
      submit([i], () => { markVoted(slide.id, [i]); paintChoiceResults(box, slide, [i]); });
    });
    box.appendChild(btn);
  });
  form.appendChild(box);
  if (chosen !== null) paintChoiceResults(box, slide, [chosen]);
}

function paintChoiceResults(box, slide, ownIndices) {
  const results = curResults();
  const btns = [...box.querySelectorAll('.vote-option')];
  if (snap.resultsHidden || !results || results.kind !== 'choice') {
    // Balken evtl. aus einem früheren Snapshot noch gesetzt (z. B. bevor die
    // Moderation „Ergebnisse ausblenden" live umgeschaltet hat) — zurücksetzen.
    btns.forEach((b, i) => {
      b.classList.remove('as-bar', 'leader');
      b.classList.toggle('own', ownIndices.includes(i));
      b.style.removeProperty('--fill');
      const countEl = b.querySelector('.vo-count');
      if (countEl) countEl.textContent = '';
    });
    return; // Ergebnis ausgeblendet: nur eigene Wahl markieren, keine Balken
  }
  const counts = results.counts || [];
  const total = counts.reduce((a, b) => a + b, 0);
  const max = Math.max(...counts, 1);
  btns.forEach((b, i) => {
    const c = counts[i] || 0;
    const pct = total ? Math.round((c / total) * 100) : 0;
    b.classList.add('as-bar');
    b.classList.toggle('own', ownIndices.includes(i));
    b.classList.toggle('leader', c > 0 && c === max);
    b.style.setProperty('--fill', (max ? (c / max) * 100 : 0) + '%');
    b.querySelector('.vo-count').textContent = `${c} · ${pct}%`;
  });
}

// --- Quiz --------------------------------------------------------------------
function quizFeedback(info) {
  const correct = info && info.correct;
  const txt = correct ? t('vote.quiz.correct', { n: info.points }) : t('vote.quiz.wrong');
  return el(`<div class="vote-submitted ${correct ? 'quiz-correct' : 'quiz-wrong'}">${esc(txt)}</div>`);
}

function buildQuiz(form, slide) {
  const prev = votedStore()[slide.id]; // { choice, correct, points } nach dem Antworten
  const answered = prev && typeof prev === 'object' && !Array.isArray(prev);
  let chosen = answered ? prev.choice : null;

  const box = el('<div class="vote-options"></div>');
  (slide.options || []).forEach((opt, i) => {
    const btn = el(`
      <button class="vote-option${chosen === i ? ' selected' : ''}" ${answered ? 'disabled' : ''}>
        <span class="mark"></span><span>${esc(opt)}</span>
      </button>`);
    if (!answered) {
      btn.addEventListener('click', () => {
        chosen = i;
        box.querySelectorAll('.vote-option').forEach((b, j) => b.classList.toggle('selected', j === i));
        submitBtn.disabled = false;
      });
    }
    box.appendChild(btn);
  });
  form.appendChild(box);

  const submitBtn = el(`<button class="ds-btn ds-btn-primary ds-btn-lg" style="margin-top:1rem;" ${chosen != null ? '' : 'disabled'}>${t('vote.quiz.submit')}</button>`);
  const note = el('<div></div>');
  submitBtn.addEventListener('click', () => {
    if (chosen == null) return;
    submit(chosen, (resp) => {
      const info = (resp && resp.quiz) || { correct: false, points: 0 };
      markVoted(slide.id, { choice: chosen, correct: info.correct, points: info.points });
      submitBtn.hidden = true;
      box.querySelectorAll('.vote-option').forEach((b) => { b.disabled = true; });
      note.innerHTML = '';
      note.appendChild(quizFeedback(info));
      showResults(slide.id); // Verteilung erst sichtbar, wenn der Moderator auflöst
    }, (e) => {
      if (e.message === 'already_answered') { submitBtn.hidden = true; note.innerHTML = ''; note.appendChild(submittedNote(t('vote.quiz.alreadyAnswered'))); }
    });
  });
  form.appendChild(submitBtn);
  form.appendChild(note);

  if (answered) {
    submitBtn.hidden = true;
    note.appendChild(quizFeedback(prev));
    showResults(slide.id);
  }
}

// --- Wortwolke ------------------------------------------------------------------
function buildWordcloud(form, slide) {
  const sentCount = (votedStore()[slide.id] || []).length;
  const remaining = () => (slide.maxWords || 1) - ((votedStore()[slide.id] || []).length);

  const field = el(`
    <div class="field">
      <input type="text" maxlength="40" placeholder="${t('vote.wordcloud.placeholder')}" autocomplete="off">
      <div class="help" id="wcHelp"></div>
    </div>`);
  const input = field.querySelector('input');
  const help = field.querySelector('#wcHelp');
  const note = el('<div></div>');

  function refresh() {
    const r = remaining();
    help.textContent = r > 0 ? t('vote.wordcloud.remaining', { n: r }) : '';
    const done = r <= 0;
    input.disabled = done;
    bar.setEnabled(!done && input.value.trim().length > 0);
    if (done) {
      note.innerHTML = '';
      note.appendChild(submittedNote(t('vote.wordcloud.done')));
      showResults(slide.id);
    }
  }

  const bar = voteBar({ label: t('common.send'), onConfirm: send });
  input.addEventListener('input', () => bar.setEnabled(input.value.trim().length > 0 && remaining() > 0));
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
  function send() {
    const word = input.value.trim();
    if (!word) return;
    submit([word], () => {
      const s = votedStore();
      s[slide.id] = [...(s[slide.id] || []), word];
      sessionStorage.setItem('puls.voted.' + presId, JSON.stringify(s));
      input.value = '';
      showResults(slide.id);
      refresh();
    });
  }

  form.appendChild(field);
  form.appendChild(note);
  if (sentCount > 0) showResults();
  refresh();
}

// --- Offene Frage ------------------------------------------------------------------
function buildOpen(form, slide) {
  const field = el(`
    <div class="field">
      <textarea rows="3" maxlength="500" placeholder="${t('vote.open.placeholder')}"></textarea>
      <div class="help">${t('vote.open.help')}</div>
    </div>`);
  const ta = field.querySelector('textarea');
  const note = el('<div></div>');

  function sendOpen() {
    const text = ta.value.trim();
    if (!text) return;
    submit(text, () => {
      ta.value = '';
      bar.setEnabled(false);
      note.innerHTML = '';
      note.appendChild(submittedNote(t('vote.open.sent')));
      showResults(slide.id);
    }, (e) => {
      if (e.message === 'limit_reached') {
        note.innerHTML = '';
        note.appendChild(submittedNote(t('vote.open.limitReached')));
      }
    });
  }

  const bar = voteBar({ label: t('common.send'), onConfirm: sendOpen });
  ta.addEventListener('input', () => bar.setEnabled(ta.value.trim().length > 0));
  bar.setEnabled(false);
  form.appendChild(field);
  form.appendChild(note);
}

// --- Skala ---------------------------------------------------------------------------
function buildScale(form, slide) {
  const prev = votedStore()[slide.id];
  let chosen = typeof prev === 'number' ? prev : null;

  const picker = el('<div class="scale-picker"></div>');
  for (let v = slide.min; v <= slide.max; v++) {
    const b = el(`<button class="scale-btn${chosen === v ? ' selected' : ''}"><span class="sb-num">${v}</span><span class="sb-count"></span></button>`);
    b.addEventListener('click', () => {
      chosen = v;
      picker.querySelectorAll('.scale-btn').forEach((x, idx) => x.classList.toggle('selected', idx + slide.min === v));
      submit(v, () => { markVoted(slide.id, v); paintScaleResults(picker, slide, v); });
    });
    picker.appendChild(b);
  }
  form.appendChild(picker);
  form.appendChild(el(`<div class="scale-labels"><span>${esc(slide.minLabel || '')}</span><span>${esc(slide.maxLabel || '')}</span></div>`));
  if (chosen !== null) paintScaleResults(picker, slide, chosen);
}

function paintScaleResults(picker, slide, ownValue) {
  const results = curResults();
  const btns = [...picker.querySelectorAll('.scale-btn')];
  if (snap.resultsHidden || !results || results.kind !== 'scale') {
    // Balken evtl. aus einem früheren Snapshot noch gesetzt — zurücksetzen.
    btns.forEach((b, idx) => {
      b.classList.remove('as-bar', 'leader');
      b.classList.toggle('own', idx + slide.min === ownValue);
      b.style.removeProperty('--fill');
      const countEl = b.querySelector('.sb-count');
      if (countEl) countEl.textContent = '';
    });
    return;
  }
  // Server liefert für Skala ein Objekt { dist: { [wert]: anzahl }, ... }, nicht ein Array.
  const dist = results.dist || {};
  const max = Math.max(...Object.values(dist), 1);
  btns.forEach((b, idx) => {
    const v = idx + slide.min;
    const c = dist[v] || 0;
    b.classList.add('as-bar');
    b.classList.toggle('own', v === ownValue);
    b.classList.toggle('leader', c > 0 && c === max);
    b.style.setProperty('--fill', (max ? (c / max) * 100 : 0) + '%');
    b.querySelector('.sb-count').textContent = c ? String(c) : '';
  });
}

// --- 100-Punkte-Verteilung (Mockup B: Slider + Budget-Balken) -----------------
// forceEdit: von morphBoards „Ändern"-Button gesetzt, damit die Eingabe wirklich
// erscheint statt wegen des vorhandenen votedStore-Eintrags sofort wieder ins
// Board zu morphen (siehe Bugfix-Hinweis im Report).
function buildPoints(form, slide, forceEdit) {
  const total = slide.total || 100;
  const opts = slide.options || [];
  const prev = votedStore()[slide.id];
  const pts = Array.isArray(prev) && prev.length === opts.length ? [...prev] : opts.map(() => 0);

  const box = el('<div class="points-list"></div>');
  const budget = el('<div class="points-budget"><div class="pb-track"><div class="pb-fill"></div></div><div class="pb-text"></div></div>');
  const rows = [];
  const used = () => pts.reduce((a, b) => a + (b || 0), 0);
  const remaining = () => total - used();

  function refresh() {
    const rem = remaining();
    budget.querySelector('.pb-fill').style.width = (used() / total * 100) + '%';
    budget.querySelector('.pb-text').textContent = t('vote.points.budget', { n: rem, total });
    budget.classList.toggle('none-left', rem <= 0);
    rows.forEach((r, i) => { r.valueEl.textContent = pts[i]; r.range.max = String((pts[i] || 0) + Math.max(0, rem)); });
    bar.setEnabled(used() > 0);
  }

  opts.forEach((opt, i) => {
    const row = el(`
      <div class="points-row slider-row">
        <span class="points-label">${esc(opt)}</span>
        <input type="range" class="points-range" min="0" step="5" value="${pts[i] || 0}" aria-label="${esc(t('vote.points.slider', { opt }))}">
        <span class="points-value">${pts[i] || 0}</span>
      </div>`);
    const range = row.querySelector('.points-range');
    const valueEl = row.querySelector('.points-value');
    range.addEventListener('input', () => {
      let v = Math.round(Number(range.value) / 5) * 5;
      const others = used() - (pts[i] || 0);
      v = Math.min(v, total - others);   // Budget hart begrenzen
      pts[i] = Math.max(0, v);
      range.value = String(pts[i]);
      refresh();
    });
    rows.push({ valueEl, range });
    box.appendChild(row);
  });

  form.appendChild(box);
  form.appendChild(budget);
  const bar = voteBar({ label: t('vote.points.submit'), onConfirm: () => {
    if (used() <= 0) return;
    submit(pts, () => { markVoted(slide.id, pts); morphBoard(form, slide, null); });
  }});
  refresh();
  if (!forceEdit && Array.isArray(prev)) morphBoard(form, slide, null);
}

// --- Ranking (Reihenfolge per Auf/Ab) ----------------------------------------
// forceEdit: von morphBoards „Ändern"-Button gesetzt, damit die Eingabe wirklich
// erscheint statt wegen des vorhandenen votedStore-Eintrags sofort wieder ins
// Board zu morphen (siehe buildPoints/Bugfix-Hinweis im Report).
function buildRanking(form, slide, forceEdit) {
  const opts = slide.options || [];
  const prev = votedStore()[slide.id];
  let order = Array.isArray(prev) && prev.length === opts.length ? [...prev] : opts.map((_, i) => i);

  form.appendChild(el(`<div class="ranking-hint">${esc(t('vote.ranking.dragHint'))}</div>`));
  const list = el('<ol class="ranking-input"></ol>');

  function render() {
    list.innerHTML = '';
    order.forEach((optIdx, pos) => {
      const row = el(`
        <li class="ranking-item" draggable="false">
          <span class="rank-handle" role="button" aria-label="${esc(t('vote.ranking.dragHint'))}">⠿</span>
          <span class="ranking-num">${pos + 1}</span>
          <span class="ranking-text">${esc(opts[optIdx])}</span>
          <span class="ranking-moves">
            <button type="button" class="ranking-move up" aria-label="${esc(t('vote.ranking.up'))}" ${pos === 0 ? 'disabled' : ''}>▲</button>
            <button type="button" class="ranking-move down" aria-label="${esc(t('vote.ranking.down'))}" ${pos === order.length - 1 ? 'disabled' : ''}>▼</button>
          </span>
        </li>`);
      row.querySelector('.up').addEventListener('click', () => { if (pos > 0) { [order[pos - 1], order[pos]] = [order[pos], order[pos - 1]]; render(); } });
      row.querySelector('.down').addEventListener('click', () => { if (pos < order.length - 1) { [order[pos + 1], order[pos]] = [order[pos], order[pos + 1]]; render(); } });
      attachDrag(row, pos);
      list.appendChild(row);
    });
  }

  function attachDrag(row, pos) {
    const handle = row.querySelector('.rank-handle');
    handle.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      const startY = e.clientY;
      const rowH = row.getBoundingClientRect().height + 6; // gap ~0.4rem
      let curPos = pos;
      row.classList.add('dragging');
      function move(ev) {
        const delta = Math.round((ev.clientY - startY) / rowH);
        let target = Math.max(0, Math.min(order.length - 1, pos + delta));
        if (target !== curPos) {
          const item = order.splice(curPos, 1)[0];
          order.splice(target, 0, item);
          curPos = target;
          render();
          // Nach render ist row weg; Drag über neues Handle fortsetzen wäre komplex —
          // hier reicht Neuaufbau; der Nutzer greift ggf. neu. Handle-Release beendet.
        }
      }
      function up() { document.removeEventListener('pointermove', move); document.removeEventListener('pointerup', up); }
      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup', up);
    });
  }

  render();
  form.appendChild(list);
  const bar = voteBar({ label: t('vote.ranking.submit'), onConfirm: () => {
    submit(order, () => { markVoted(slide.id, order); morphBoard(form, slide, null); });
  }});
  bar.setEnabled(true);
  if (!forceEdit && Array.isArray(prev)) morphBoard(form, slide, null);
}

// --- Q&A --------------------------------------------------------------------------------
function buildQa(form, slide) {
  const field = el(`
    <div class="field">
      <textarea rows="2" maxlength="500" placeholder="${t('vote.qa.placeholder')}"></textarea>
    </div>`);
  const ta = field.querySelector('textarea');
  const btn = el(`<button class="ds-btn ds-btn-primary ds-btn-lg">${t('vote.qa.submit')}</button>`);
  const note = el('<div></div>');

  btn.addEventListener('click', () => {
    const text = ta.value.trim();
    if (!text) return;
    submit(text, () => {
      ta.value = '';
      note.innerHTML = '';
      note.appendChild(submittedNote(slide.moderated ? t('vote.qa.pending') : t('vote.qa.sent')));
    }, (e) => {
      if (e.message === 'limit_reached') {
        note.innerHTML = '';
        note.appendChild(submittedNote(t('vote.qa.limitReached')));
      }
    });
  });
  form.appendChild(field);
  form.appendChild(btn);
  form.appendChild(note);
  showResults(); // Fragenliste ist bei Q&A immer sichtbar
}

// ---------------------------------------------------------------------------
// Ergebnisse
// ---------------------------------------------------------------------------

let resultsVisible = false;
// forId (optional): nur einblenden, wenn die Person noch auf DIESER Folie ist.
// Verhindert, dass eine spät eintreffende Antwort einer anderen Folie die
// Ergebnisse der inzwischen offenen (noch nicht beantworteten) Folie zeigt.
function showResults(forId) {
  if (forId != null && (!curSlide() || curSlide().id !== forId)) return;
  resultsVisible = true;
  updateResults();
}

function updateResults() {
  const block = document.getElementById('resultsBlock');
  const box = document.getElementById('resultsBox');
  const slide = curSlide();
  if (!block || !box || !slide) return;

  const isQa = slide.type === 'qa';
  if (!resultsVisible && !isQa) { block.hidden = true; return; }
  if (snap.resultsHidden || !curResults()) { block.hidden = true; return; }

  block.hidden = false;
  renderResults(box, slide, curResults(), isQa ? {
    onUpvote: async (qid) => {
      // Optimistisch umschalten und sofort neu zeichnen — sonst überschreibt ein
      // eintreffender Live-Snapshot die eigene Markierung, bevor die Antwort da ist.
      const had = upvoted.has(qid);
      if (had) upvoted.delete(qid); else upvoted.add(qid);
      localStorage.setItem('puls.upvoted.' + presId, JSON.stringify([...upvoted]));
      updateResults();
      try {
        await api('POST', `/api/presentations/${presId}/upvote`, {
          slideId: slide.id, participantId: PID, questionId: qid,
        });
      } catch {
        // Fehlgeschlagen → Markierung zurücknehmen
        if (had) upvoted.add(qid); else upvoted.delete(qid);
        localStorage.setItem('puls.upvoted.' + presId, JSON.stringify([...upvoted]));
        updateResults();
      }
    },
    upvoted,
  } : { leaderboard: snap.leaderboard });
}

function refreshLanguage() {
  document.title = t('vote.pageTitle');
  if (!snap) return;
  const wasVisible = resultsVisible;
  buildSlide();
  if (wasVisible) showResults();
}
