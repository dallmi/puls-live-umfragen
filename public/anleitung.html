<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PULS — Quickstart</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/design-system.css">
<link rel="stylesheet" href="/app.css">
<style>
  .guide { max-width: 820px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }
  .guide-cover { padding: 1rem 0 1.75rem; border-bottom: 2px solid var(--primary); margin-bottom: 2rem; }
  .guide-cover .kicker { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--primary); }
  .guide-cover h1 { font-size: 2.6rem; font-weight: 300; line-height: 1.1; color: var(--black); margin: 0.35rem 0 0.75rem; letter-spacing: -0.01em; }
  .guide-cover p { font-size: 1rem; color: var(--grey-5); max-width: 46rem; line-height: 1.5; }
  .guide-meta { margin-top: 1rem; font-size: 0.85rem; color: var(--grey-4); }
  .guide-meta b { color: var(--grey-6); }

  .step { display: grid; grid-template-columns: 2.4rem 1fr; gap: 0 1rem; margin-bottom: 2.5rem; align-items: start; }
  .step-num {
    width: 2.4rem; height: 2.4rem; display: flex; align-items: center; justify-content: center;
    background: var(--primary); color: var(--white); border-radius: var(--radius);
    font-size: 1.15rem; font-weight: 700; font-variant-numeric: tabular-nums;
  }
  .step-body h2 { font-size: 1.3rem; font-weight: 600; color: var(--black); margin: 0.15rem 0 0.5rem; line-height: 1.25; }
  .step-body p { font-size: 0.95rem; color: var(--grey-6); line-height: 1.55; margin: 0 0 0.6rem; }
  .step-body ul { margin: 0.2rem 0 0.7rem; padding-left: 1.15rem; }
  .step-body li { font-size: 0.92rem; color: var(--grey-6); line-height: 1.5; margin-bottom: 0.2rem; }
  .step-body li b, .step-body p b { color: var(--black); }
  .shot { margin-top: 0.4rem; border: 1px solid var(--grey-1); border-radius: var(--radius); overflow: hidden; background: var(--white); }
  .shot img { display: block; width: 100%; height: auto; }
  .shot.phone { max-width: 300px; }
  .cap { font-size: 0.78rem; color: var(--grey-4); margin-top: 0.4rem; }

  .feature-h { font-size: 1.3rem; font-weight: 600; color: var(--black); margin: 0.5rem 0 1rem; padding-top: 1.5rem; border-top: 1px solid var(--grey-1); }
  .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem 1.25rem; }
  .feat { border-left: 3px solid var(--primary); padding: 0.35rem 0 0.35rem 0.75rem; }
  .feat b { display: block; font-size: 0.92rem; color: var(--black); }
  .feat span { font-size: 0.85rem; color: var(--grey-5); line-height: 1.45; }

  .tip { background: var(--surface); border-radius: var(--radius); padding: 0.9rem 1.1rem; margin: 1.5rem 0; font-size: 0.9rem; color: var(--grey-6); line-height: 1.5; }
  .tip b { color: var(--black); }
  .pdf-fab { position: sticky; bottom: 1.25rem; float: right; margin-top: 1rem; }

  @media print {
    .no-print { display: none !important; }
    body { background: var(--white); }
    .guide { max-width: none; padding: 0; }
    .step, .feat, .shot { break-inside: avoid; page-break-inside: avoid; }
    .guide-cover { break-after: avoid; }
    h2, .feature-h { break-after: avoid; }
    a { color: inherit; text-decoration: none; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    @page { margin: 14mm 14mm 16mm; }
  }
</style>
</head>
<body>

<header class="ds-header no-print">
  <a class="brand ds-title" href="/"><b>PULS</b> <span>Quickstart</span></a>
  <div class="ds-header-controls">
    <a class="ds-btn ds-btn-primary" id="pdfLink" href="/anleitung.pdf" download>PDF</a>
    <button class="ds-btn" id="btnPrint" type="button">Print</button>
    <a class="ds-btn" id="toApp" href="/">App</a>
    <span id="langToggle"></span>
  </div>
</header>

<main><div class="guide" id="guide"></div></main>

<footer class="footer-note no-print" style="text-align:center;">
  <a href="/" id="footApp">Zur App</a> · <a href="/datenschutz.html" id="footPrivacy">Datenschutz</a>
</footer>

<script src="/i18n.js"></script>
<script>
'use strict';

const SHOTS = ['01-start.png', '02-editor.png', '03-praesentieren.png', '04-abstimmen.png', '05-quiz.png'];

const GUIDE = {
  de: {
    title: 'PULS — Quickstart', pdf: 'PDF herunterladen', print: 'Drucken', app: 'Zur App', privacy: 'Datenschutz',
    kicker: 'Live-Umfragen · Anleitung',
    h1: 'In 5 Minuten zur ersten Live‑Umfrage',
    intro: 'PULS ist ein Werkzeug für interaktive Präsentationen: Sie stellen Fragen, das Publikum stimmt per Code auf dem eigenen Handy ab, und die Ergebnisse erscheinen live auf der Leinwand. Keine Konten, keine Installation — nur ein Browser.',
    meta: 'Für den Moderator (Sie) genügt ein Laptop mit Beamer, für das Publikum ein Smartphone. Diese Seite lässt sich oben rechts über <b>„PDF herunterladen"</b> als PDF sichern oder ausdrucken.',
    steps: [
      { h2: 'Präsentation erstellen', img: 0,
        body: '<p>Auf der Startseite steht das <b>Beitreten</b> im Mittelpunkt (für das Publikum). Ihren eigenen Einstieg finden Sie darunter unter <b>„Neue Präsentation erstellen"</b>: Titel eingeben, auf <b>Erstellen</b> klicken — Sie erhalten sofort einen privaten Moderationslink und einen sechsstelligen Zugangscode.</p><ul><li><b>Zugang sichern:</b> Der Moderationslink liegt nur in Ihrem Browser. Sichern Sie ihn direkt nach dem Erstellen per <b>Kopieren, QR‑Code oder E‑Mail</b>, damit Sie ihn nicht verlieren.</li><li>Ihre Präsentationen erscheinen auf demselben Gerät wieder unter <b>„Meine Präsentationen"</b>.</li></ul>',
        cap: 'Startseite — Beitreten steht im Mittelpunkt, „Neue Präsentation" ist der ruhige Zweitweg.' },
      { h2: 'Folien anlegen — Typ‑Galerie & Live‑Vorschau', img: 1,
        body: '<p>Der Editor hat drei Spalten: links die <b>Folienliste</b> (ziehen zum Sortieren), in der Mitte die Folie, rechts eine <b>Live‑Handy‑Vorschau</b>, die beim Tippen mitläuft. Über <b>„+ Neue Folie"</b> oder <b>„Typ ändern"</b> öffnet sich die <b>Typ‑Galerie</b> — 9 Kacheln mit Icon und kurzer Erklärung:</p><ul><li><b>Multiple Choice</b> · <b>Wortwolke</b> · <b>Offene Frage</b> · <b>Skala</b></li><li><b>Ranking</b> · <b>100 Punkte</b> · <b>Quiz</b> (mit richtiger Antwort)</li><li><b>Q&amp;A</b> (Fragen aus dem Publikum mit 👍) · <b>Infofolie</b></li></ul><p>Feineinstellungen sind eingeklappt und lassen sich bei Bedarf aufklappen. Alles wird automatisch gespeichert.</p>',
        cap: 'Editor — Typ‑Galerie mit 9 Kacheln, links die Folienliste, rechts die mitlaufende Handy‑Vorschau.' },
      { h2: 'Präsentieren — die Beitritts‑Bühne', img: 2,
        body: '<p>Klicken Sie oben rechts auf <b>Präsentieren</b>. Zuerst erscheint die <b>Beitritts‑Bühne</b>: großer Zugangscode, QR‑Code und ein <b>Live‑Zähler</b>, der zeigt, wie viele schon dabei sind. Sobald genug Leute da sind, starten Sie mit <b>„Los geht\'s"</b>.</p><ul><li>Mit <b>← / →</b> (oder den Pfeiltasten) wechseln Sie die Folie; Tastatur‑Hinweise sind eingeblendet.</li><li><b>Ergebnisse</b> und <b>Abstimmung</b> schalten Sie über echte Zustands‑Umschalter mit Status‑Chips ein und aus.</li></ul>',
        cap: 'Präsentationsmodus — Beitritts‑Bühne mit großem Code, QR und Live‑Zähler.' },
      { h2: 'Das Publikum stimmt ab', img: 3, phone: true,
        body: '<p>Die Teilnehmenden öffnen die angezeigte Adresse (oder scannen den QR‑Code) und geben den Code ein. Das Antworten ist überall gleich: Ein <b>Antippen sendet sofort</b> — die Optionen <b>morphen an Ort und Stelle</b> zu Ergebnis‑Balken, die eigene Wahl ist markiert. Ändern ist möglich, solange die Abstimmung offen ist.</p><ul><li>Mehrwertige Typen (<b>100 Punkte</b>, <b>Ranking</b>, <b>Offene Frage</b>) bestätigen über eine feste Leiste unten.</li><li>Ganz unten kann das Publikum zusätzlich mit <b>Emojis</b> reagieren.</li></ul>',
        cap: 'Handy‑Ansicht nach dem Antippen — die Optionen werden an Ort und Stelle zu Ergebnis‑Balken, die eigene Wahl ist markiert.' },
      { h2: 'Quiz mit Rangliste', img: 4,
        body: '<p>Beim Folientyp <b>Quiz</b> markieren Sie die richtige Antwort. Schnelle und richtige Antworten geben mehr Punkte. Erst wenn Sie <b>„Ergebnisse einblenden"</b> klicken, erscheint die Auflösung: die richtige Antwort wird <b>grün hervorgehoben</b> und darunter zeigt eine <b>🏆 Rangliste</b> die Führenden (dafür die <b>Namenserfassung</b> aktivieren).</p>',
        cap: 'Quiz nach der Auflösung — richtige Antwort grün hervorgehoben, darunter die Rangliste.' },
    ],
    featuresTitle: 'Weitere Funktionen',
    features: [
      ['Branding', 'Akzentfarbe und eigenes Logo pro Präsentation.'],
      ['Namen erfassen', 'Optional; Namen erscheinen bei Q&amp;A, offenen Antworten und in der Quiz‑Rangliste.'],
      ['Selbststeuerung', 'Das Publikum blättert im eigenen Tempo durch alle Folien.'],
      ['Q&amp;A‑Moderation', 'Fragen erst nach Ihrer Freigabe öffentlich zeigen.'],
      ['Reaktionen', 'Live‑Emojis (👍 ❤️ 👏 …) vom Publikum.'],
      ['Trends über Sitzungen', '„Neue Sitzung starten" archiviert die Ergebnisse; ein Verlauf vergleicht mehrere Durchläufe.'],
      ['Export', 'Ergebnisse als <b>Excel</b> und <b>PowerPoint</b> herunterladen.'],
      ['Anonym &amp; datensparsam', 'Keine Konten, keine Cookies, keine Tracker.'],
    ],
    tip: '<b>Tipp:</b> Erstellen Sie Ihre Folien in Ruhe vorab. Am Veranstaltungstag genügt es, den Moderationslink zu öffnen, auf <b>Präsentieren</b> zu klicken und den Code zu zeigen. Ergebnisse bleiben auch nach der Veranstaltung erhalten und lassen sich exportieren.',
  },
  en: {
    title: 'PULS — Quickstart', pdf: 'Download PDF', print: 'Print', app: 'To the app', privacy: 'Privacy',
    kicker: 'Live polling · Guide',
    h1: 'Your first live poll in 5 minutes',
    intro: 'PULS is a tool for interactive presentations: you ask questions, the audience votes via a code on their own phone, and results appear live on the screen. No accounts, no installation — just a browser.',
    meta: 'As the host you only need a laptop with a projector; the audience needs a smartphone. You can save this page as a PDF or print it via <b>„Download PDF"</b> in the top right.',
    steps: [
      { h2: 'Create a presentation', img: 0,
        body: '<p>On the start page, <b>joining</b> takes centre stage (for your audience). Your own entry point sits below under <b>„Create a new presentation"</b>: enter a title, click <b>Create</b> — you immediately get a private presenter link and a six‑digit access code.</p><ul><li><b>Secure your access:</b> the presenter link lives only in your browser. Right after creating, save it via <b>copy, QR code or email</b> so you don\'t lose it.</li><li>Your presentations reappear on the same device under <b>„My presentations"</b>.</li></ul>',
        cap: 'Start page — joining takes centre stage, „New presentation" is the calm secondary path.' },
      { h2: 'Build your slides — type gallery & live preview', img: 1,
        body: '<p>The editor has three columns: the <b>slide list</b> on the left (drag to reorder), the slide in the middle, and a <b>live phone preview</b> on the right that follows your typing. <b>„+ New slide"</b> or <b>„Change type"</b> opens the <b>type gallery</b> — 9 tiles with an icon and a short explanation:</p><ul><li><b>Multiple Choice</b> · <b>Word Cloud</b> · <b>Open Question</b> · <b>Scale</b></li><li><b>Ranking</b> · <b>100 Points</b> · <b>Quiz</b> (with a correct answer)</li><li><b>Q&amp;A</b> (audience questions with 👍) · <b>Info slide</b></li></ul><p>Fine settings are collapsed and expand when you need them. Everything is saved automatically.</p>',
        cap: 'Editor — type gallery with 9 tiles, slide list on the left, live phone preview on the right.' },
      { h2: 'Present — the join stage', img: 2,
        body: '<p>Click <b>Present</b> in the top right. First comes the <b>join stage</b>: a large access code, a QR code and a <b>live counter</b> of how many people are already in. Once enough have joined, start with <b>„Let\'s go"</b>.</p><ul><li>Use <b>← / →</b> (or the arrow keys) to change slides; keyboard hints are shown.</li><li>Toggle <b>results</b> and <b>voting</b> with real state switches and status chips.</li></ul>',
        cap: 'Presentation mode — join stage with a large code, QR and a live counter.' },
      { h2: 'The audience votes', img: 3, phone: true,
        body: '<p>Participants open the shown address (or scan the QR code) and enter the code. Answering is the same everywhere: a <b>tap sends immediately</b> — the options <b>morph in place</b> into result bars, with your own choice marked. You can change your answer while voting is open.</p><ul><li>Multi‑value types (<b>100 Points</b>, <b>Ranking</b>, <b>Open Question</b>) confirm via a fixed bar at the bottom.</li><li>At the very bottom the audience can also react with <b>emojis</b>.</li></ul>',
        cap: 'Phone view after tapping — the options morph in place into result bars, your own choice marked.' },
      { h2: 'Quiz with a leaderboard', img: 4,
        body: '<p>With the <b>Quiz</b> slide type you mark the correct answer. Fast, correct answers earn more points. Only when you click <b>„Show results"</b> does the reveal appear: the correct answer is <b>highlighted green</b> and a <b>🏆 leaderboard</b> below shows the frontrunners (enable <b>name collection</b> for this).</p>',
        cap: 'Quiz after the reveal — correct answer highlighted green, leaderboard below.' },
    ],
    featuresTitle: 'More features',
    features: [
      ['Branding', 'Accent colour and your own logo per presentation.'],
      ['Collect names', 'Optional; names appear on Q&amp;A, open answers and the quiz leaderboard.'],
      ['Self-paced', 'The audience moves through all slides at their own pace.'],
      ['Q&amp;A moderation', 'Show questions publicly only after your approval.'],
      ['Reactions', 'Live emojis (👍 ❤️ 👏 …) from the audience.'],
      ['Trends across sessions', '„Start new session" archives the results; a history compares several runs.'],
      ['Export', 'Download results as <b>Excel</b> and <b>PowerPoint</b>.'],
      ['Anonymous &amp; data-minimal', 'No accounts, no cookies, no trackers.'],
    ],
    tip: '<b>Tip:</b> Build your slides calmly in advance. On the day, just open the presenter link, click <b>Present</b> and show the code. Results stay available after the event and can be exported.',
  },
};

function shotSrc(lang, file) { return lang === 'en' ? '/img/anleitung/en/' + file : '/img/anleitung/' + file; }
function esc(s) { return String(s); } // Inhalte sind vertrauenswürdig (fest im Skript)

function render(lang) {
  const g = GUIDE[lang] || GUIDE.de;
  document.title = g.title;
  document.documentElement.lang = lang;
  let html = `
    <section class="guide-cover">
      <div class="kicker">${g.kicker}</div>
      <h1>${g.h1}</h1>
      <p>${g.intro}</p>
      <div class="guide-meta">${g.meta}</div>
    </section>`;
  g.steps.forEach((st, i) => {
    html += `
      <div class="step">
        <div class="step-num">${i + 1}</div>
        <div class="step-body">
          <h2>${st.h2}</h2>
          ${st.body}
          <div class="shot${st.phone ? ' phone' : ''}"><img src="${shotSrc(lang, SHOTS[st.img])}" alt="${st.h2}"></div>
          <div class="cap">${st.cap}</div>
        </div>
      </div>`;
  });
  html += `<h2 class="feature-h">${g.featuresTitle}</h2><div class="feature-grid">`;
  g.features.forEach(([b, s]) => { html += `<div class="feat"><b>${b}</b><span>${s}</span></div>`; });
  html += `</div><div class="tip">${g.tip}</div>`;
  html += `<a class="ds-btn ds-btn-primary pdf-fab no-print" href="${lang === 'en' ? '/anleitung-en.pdf' : '/anleitung.pdf'}" download>${g.pdf}</a>`;
  document.getElementById('guide').innerHTML = html;

  // Kopf-/Fußzeile lokalisieren
  document.getElementById('pdfLink').textContent = g.pdf;
  document.getElementById('pdfLink').setAttribute('href', lang === 'en' ? '/anleitung-en.pdf' : '/anleitung.pdf');
  document.getElementById('btnPrint').textContent = g.print;
  document.getElementById('toApp').textContent = g.app;
  document.getElementById('footApp').textContent = g.app;
  document.getElementById('footPrivacy').textContent = g.privacy;
}

// ?lang= erlaubt es dem PDF-Renderer, die Sprache zu erzwingen
const forced = new URLSearchParams(location.search).get('lang');
if (forced === 'en' || forced === 'de') setLang(forced);
render(getLang());

initLangToggle(document.getElementById('langToggle'), () => render(getLang()));
document.getElementById('btnPrint').addEventListener('click', () => window.print());
</script>
</body>
</html>
